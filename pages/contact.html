<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Slab&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div>
        <a href="../index.html"
          ><img
            class="lab-logo"
            src="../images/lab-icon.png"
            alt="laboratory logo"
        /></a>
      </div>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <!--According to chatGpt href="#", it affects navigability and SEO, and
          aria-current="page" indicates the current page for screen readers-->
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="banner">
        <h1>Contact</h1>
      </section>

      <section>
        <h2 class="sr-only">Contact information</h2>
        <div class="card">
          <!-- for decorative images, alt="" makes screen readers ignore it;
           aria-hidden="true" hides it from screen readers. -->
          <img
            class="contact-icon"
            src="../images/whatsApp-icon.svg"
            alt=""
            aria-hidden="true"
          />
          <span>(11)3467-9809</span>
        </div>
        <div class="card">
          <img
            class="contact-icon"
            src="../images/mail-icon.svg"
            alt=""
            aria-hidden="true"
          />
          <span>labemail@gmail.com</span>
        </div>
        <div class="card">
          <img
            class="contact-icon"
            src="../images/call-icon.svg"
            alt=""
            aria-hidden="true"
          />
          <span>(11)0976-1245</span>
        </div>
      </section>
      <section id="contact-form-container">
        <h2>Send LabName a Message</h2>
        <p>In order to assist, please provide the following information:</p>
        <br />
        <div>
          <form action="/send" method="post">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" />
            <br />
            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
            <br />
            <label for="message"
              >Please provide a detailed question or comment.</label
            >
            <textarea name="message" id="message"></textarea>
            <br />
            <!-- Fieldset + legend groups the radio options and gives the question a clear title -->
            <fieldset>
              <legend>Are you a labName's patient?</legend>
              <input type="radio" name="isPatient" id="yes" value="yes" />
              <label for="yes">Yes</label>
              <input type="radio" name="isPatient" id="no" value="no" />
              <label for="no">No</label>
            </fieldset>

            <br />
            <input type="submit" value="Send" />
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div>
        <!-- rel="noopener noreferrer", Adds extra security when opening this link in a new tab -->
        <a href="https://x.com/" target="_blank" rel="noopener noreferrer"
          ><img src="../images/x-logo.svg" alt="X (Twitter)"
        /></a>
        <a
          href="https://www.instagram.com/"
          target="_blank"
          rel="noopener noreferrer"
          ><img src="../images/instagram-logo.svg" alt="instagram"
        /></a>
        <a
          href="https://www.facebook.com/"
          target="_blank"
          rel="noopener noreferrer"
          ><img src="../images/facebook-logo.svg" alt="facebook"
        /></a>
      </div>
    </footer>
  </body>
</html>
